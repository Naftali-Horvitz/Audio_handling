services:
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.8.3
    ports:
      - 9092:9092
    environment:
      KAFKA_KRAFT_MODE: "true"
      CLUSTER_ID: "1L6g7nGhU-eAKfL--X25wo"
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "kafka-topics --bootstrap-server kafka:9092 --list",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  mongodb:
    container_name: mongodb
    image: mongo:7
    ports:
      - 27017:27017
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  elasticsearch:
    container_name: elasticsearch
    image: elasticsearch:9.3.0
    ports:
      - 9200:9200
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl --fail http://localhost:9200/_cat/health?h=st | grep -E 'green|yellow'",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  kibana:
    container_name: kibana
    image: docker.elastic.co/kibana/kibana:9.3.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - 5601:5601

    depends_on:
      elasticsearch:
        condition: service_healthy

  service_metadata:
    container_name: service_metadata
    build: ./service_metadata
    environment:
      BOOTSTRAP_SERVERS: "kafka:9092"
      PRODUCER_TOPIC: "METADATA"
      ES_HOST: "http://elasticsearch:9200"
    volumes:
      - ./shared/podcasts:/app/podcasts
      - ./shared/logger:/app/logger
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
  
  save_metadata:
    container_name: save_metadata
    build: ./save_metadata
    environment:
      BOOTSTRAP_SERVERS: "kafka:9092"
      MONGO_URI: mongodb://mongodb:27017
      CONSUMER_TOPIC: "METADATA"
      ES_HOST: "http://elasticsearch:9200"
    volumes:
      - ./shared/podcasts:/app/podcasts
      - ./shared/logger:/app/logger
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

        
volumes:
  kafka_data:
  mongodb_data:
  elasticsearch_data:
