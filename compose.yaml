services:
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.8.3
    ports:
      - 9092:9092
    environment:
      KAFKA_KRAFT_MODE: "true"
      CLUSTER_ID: "1L6g7nGhU-eAKfL--X25wo"
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "kafka-topics --bootstrap-server kafka:9092 --list",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  mongodb:
    container_name: mongodb
    image: mongo:7
    ports:
      - 27017:27017
    volumes:
      - mongodb_data:data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  elasticsearch:
    container_name: elasticsearch
    image: elasticsearch:9.3.0
    ports:
      - 9200:9200
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl --fail http://localhost:9200/_cat/health?h=st | grep -E 'green|yellow'",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - elastic

  kibana:
    container_name: kibana
    image: docker.elastic.co/kibana/kibana:8.13.4
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTIC_PASSWORD=<password>
      - ELASTICSEARCH_SERVICE_TOKEN=<token>
    ports:
      - 5601:5601
    networks:
      - elastic
    depends_on:
      elasticsearch:
        condition: service_healthy

  load_audio_file:
    container_name: load_audio_file
    build: ./load_audio_file
    environment:
      BOOTSTRAP_SERVERS: "kafka:9092"
      PRODUCER_TOPIC: "METADATA"
    volumes:
      - ./load_audio_file/podcasts:/app/podcasts
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka_data:
  mongodb_data:
  elasticsearch_data:
